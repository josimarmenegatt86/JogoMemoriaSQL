<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Memory Game | SENAI</title>
  <style>
    :root {
      --primary: #0077cc;
      --success: #2ecc71;
      --error: #e74c3c;
      --bg: #0b0e14;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d); /* Fundo tipo aurora/galáxia */
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    .score-board {
      display: flex;
      gap: 20px;
      background: var(--glass);
      padding: 15px 30px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .game-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      perspective: 1000px; /* Necessário para efeito 3D */
      max-width: 600px;
      width: 95%;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    /* Lados da Carta */
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Verso (Escondido) */
    .card-front {
      background: linear-gradient(135deg, #0077cc, #004477);
      color: white;
      font-size: 2rem;
    }

    /* Frente (Revelada) */
    .card-back {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transform: rotateY(180deg);
      font-size: 0.9rem;
      border: 3px solid var(--primary);
    }

    .card.matched .card-back {
      background-color: var(--success);
      color: white;
      border-color: #1b9e53;
    }

    .card.error .card-back {
      background-color: var(--error);
      color: white;
      border-color: #c0392b;
    }

    @media (max-width: 480px) {
      .game-container { grid-template-columns: repeat(3, 1fr); }
      .card-back { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <h1>SQL Memory Quest</h1>
  
  <div class="score-board">
    <div id="scoreBoard">Pontos: 0</div>
    <div id="timeBoard">Tempo: 0s</div>
  </div>

  <div class="game-container" id="gameBoard"></div>

  <script>
    const cardsData = [
      { term: "SELECT", concept: "Extrai dados de um banco de dados", pairId: 1 },
      { term: "INSERT", concept: "Insere novos dados em uma tabela", pairId: 2 },
      { term: "DELETE", concept: "Remove dados de uma tabela", pairId: 3 },
      { term: "UPDATE", concept: "Modifica dados existentes", pairId: 4 },
      { term: "CREATE", concept: "Cria nova tabela ou banco", pairId: 5 },
      { term: "DROP", concept: "Exclui uma tabela ou banco", pairId: 6 },
      { term: "ALTER", concept: "Modifica estrutura da tabela", pairId: 7 },
      { term: "JOIN", concept: "Combina registros de várias tabelas", pairId: 8 }
    ];

    let flippedCards = [];
    let matchedCards = 0;
    let score = 0;
    let timer;
    let timeElapsed = 0;
    let isLocked = false;

    function startTimer() {
      if(timer) return;
      timer = setInterval(() => {
        timeElapsed++;
        document.getElementById('timeBoard').innerText = `Tempo: ${timeElapsed}s`;
      }, 1000);
    }

    function createBoard() {
      const gameBoard = document.getElementById('gameBoard');
      const deck = [];
      cardsData.forEach(item => {
        deck.push({ content: item.term, pairId: item.pairId });
        deck.push({ content: item.concept, pairId: item.pairId });
      });

      deck.sort(() => Math.random() - 0.5);

      deck.forEach(data => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.pairId = data.pairId;
        
        card.innerHTML = `
          <div class="card-front">?</div>
          <div class="card-back">${data.content}</div>
        `;

        card.addEventListener('click', flipCard);
        gameBoard.appendChild(card);
      });
    }

    function flipCard() {
      if (isLocked || this.classList.contains('flipped') || this.classList.contains('matched')) return;

      startTimer();
      this.classList.add('flipped');
      flippedCards.push(this);

      if (flippedCards.length === 2) {
        checkMatch();
      }
    }

    function checkMatch() {
      isLocked = true;
      const [card1, card2] = flippedCards;
      const isMatch = card1.dataset.pairId === card2.dataset.pairId;

      if (isMatch) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        score += 10;
        matchedCards += 2;
        resetTurn();
        if (matchedCards === cardsData.length * 2) {
          clearInterval(timer);
          setTimeout(() => alert(`Missão Cumprida! ${score} pontos em ${timeElapsed}s`), 500);
        }
      } else {
        card1.classList.add('error');
        card2.classList.add('error');
        score = Math.max(0, score - 2);
        setTimeout(() => {
          card1.classList.remove('flipped', 'error');
          card2.classList.remove('flipped', 'error');
          resetTurn();
        }, 1000);
      }
      document.getElementById('scoreBoard').innerText = `Pontos: ${score}`;
    }

    function resetTurn() {
      flippedCards = [];
      isLocked = false;
    }

    createBoard();
  </script>
</body>
</html>
