<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Memory Quest | SENAI</title>
  <style>
    :root {
      --primary: #4fc3f7;
      --primary-dark: #0288d1;
      --success: #00e676;
      --error: #ff5252;
      --bg: #e1f5fe;
      --glass: rgba(255, 255, 255, 0.7);
      --text: #01579b;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
    }

    h1 {
      font-size: 2.2rem;
      color: #0277bd;
      margin-bottom: 5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
    }

    /* Placar e Controles */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .score-board {
      display: flex;
      gap: 20px;
      background: var(--glass);
      padding: 10px 25px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 4px 15px rgba(0,119,204,0.1);
      font-weight: bold;
    }

    .btn-reset {
      background-color: var(--primary-dark);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn-reset:hover {
      background-color: #01579b;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    /* Tabuleiro */
    .game-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      perspective: 1000px;
      max-width: 550px;
      width: 95%;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      font-weight: 600;
      box-sizing: border-box;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    /* Estilo do Verso (Azul) */
    .card-front {
      background: linear-gradient(135deg, #4fc3f7, #29b6f6);
      color: white;
      font-size: 1.8rem;
      border: 2px solid #fff;
    }

    /* Estilo da Frente (Conteúdo) */
    .card-back {
      background: #ffffff;
      color: #0277bd;
      transform: rotateY(180deg);
      font-size: 0.85rem;
      border: 3px solid var(--primary);
    }

    /* Estados Especiais */
    .card.matched .card-back {
      background-color: var(--success);
      color: #004d40;
      border-color: #00c853;
    }

    .card.error .card-back {
      background-color: var(--error);
      color: white;
      border-color: #d32f2f;
    }

    @media (max-width: 480px) {
      .game-container { grid-template-columns: repeat(3, 1fr); }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <h1>SQL Memory Quest</h1>
  
  <div class="controls">
    <div class="score-board">
      <div id="scoreBoard">Pontos: 0</div>
      <div id="timeBoard">Tempo: 0s</div>
    </div>
    <button class="btn-reset" onclick="resetGame()">Reiniciar Jogo</button>
  </div>

  <div class="game-container" id="gameBoard"></div>

  <script>
    const cardsData = [
      { term: "SELECT", concept: "Extrai dados de um banco de dados", pairId: 1 },
      { term: "INSERT", concept: "Insere novos dados em uma tabela", pairId: 2 },
      { term: "DELETE", concept: "Remove dados de uma tabela", pairId: 3 },
      { term: "UPDATE", concept: "Modifica dados existentes", pairId: 4 },
      { term: "CREATE", concept: "Cria nova tabela ou banco", pairId: 5 },
      { term: "DROP", concept: "Exclui uma tabela ou banco", pairId: 6 },
      { term: "ALTER", concept: "Modifica estrutura da tabela", pairId: 7 },
      { term: "JOIN", concept: "Combina registros de várias tabelas", pairId: 8 }
    ];

    let flippedCards = [];
    let matchedCards = 0;
    let score = 0;
    let timer = null;
    let timeElapsed = 0;
    let isLocked = false;

    // Inicialização
    function initGame() {
      const gameBoard = document.getElementById('gameBoard');
      gameBoard.innerHTML = ''; // Limpa o tabuleiro
      
      const deck = [];
      cardsData.forEach(item => {
        deck.push({ content: item.term, pairId: item.pairId });
        deck.push({ content: item.concept, pairId: item.pairId });
      });

      // Embaralhar
      deck.sort(() => Math.random() - 0.5);

      deck.forEach(data => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.pairId = data.pairId;
        
        card.innerHTML = `
          <div class="card-front">?</div>
          <div class="card-back">${data.content}</div>
        `;

        card.addEventListener('click', flipCard);
        gameBoard.appendChild(card);
      });
    }

    function startTimer() {
      if(timer) return;
      timer = setInterval(() => {
        timeElapsed++;
        document.getElementById('timeBoard').innerText = `Tempo: ${timeElapsed}s`;
      }, 1000);
    }

    function flipCard() {
      if (isLocked || this.classList.contains('flipped') || this.classList.contains('matched')) return;

      startTimer();
      this.classList.add('flipped');
      flippedCards.push(this);

      if (flippedCards.length === 2) {
        checkMatch();
      }
    }

    function checkMatch() {
      isLocked = true;
      const [card1, card2] = flippedCards;
      const isMatch = card1.dataset.pairId === card2.dataset.pairId;

      if (isMatch) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        score += 10;
        matchedCards += 2;
        resetTurn();
        
        if (matchedCards === cardsData.length * 2) {
          clearInterval(timer);
          setTimeout(() => alert(`Excelente! Você marcou ${score} pontos em ${timeElapsed} segundos.`), 500);
        }
      } else {
        card1.classList.add('error');
        card2.classList.add('error');
        score = Math.max(0, score - 2);
        setTimeout(() => {
          card1.classList.remove('flipped', 'error');
          card2.classList.remove('flipped', 'error');
          resetTurn();
        }, 1000);
      }
      document.getElementById('scoreBoard').innerText = `Pontos: ${score}`;
    }

    function resetTurn() {
      flippedCards = [];
      isLocked = false;
    }

    // Função de Reiniciar
    function resetGame() {
      // 1. Para o cronômetro
      clearInterval(timer);
      timer = null;
      
      // 2. Reseta variáveis
      timeElapsed = 0;
      score = 0;
      matchedCards = 0;
      flippedCards = [];
      isLocked = false;
      
      // 3. Atualiza interface
      document.getElementById('scoreBoard').innerText = `Pontos: 0`;
      document.getElementById('timeBoard').innerText = `Tempo: 0s`;
      
      // 4. Recria o tabuleiro
      initGame();
    }

    // Carrega o jogo pela primeira vez
    initGame();
  </script>
</body>
</html>
